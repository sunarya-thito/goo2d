site_name: Goo2D Documentation
theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: cyan

nav:
  - Home: index.md
  - Installation: installation.md
  - Architecture: architecture.md
  - Input System: input.md
  - Collision System: collisions.md
  - Lifecycle & State: lifecycle.md
  - Asset System: assets.md
  - Tutorials:
      - Your First Game: tutorials/first-game.md
      - Input and Movement: tutorials/input-movement.md
      - Collisions and Screen Bounds: tutorials/collisions-screen.md
      - Coroutines and Logic: tutorials/coroutines-logic.md
  - API Reference: api/index.html

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
